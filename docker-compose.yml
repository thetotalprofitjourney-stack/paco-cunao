version: '3.8'

# NOTA: Este archivo es solo para desarrollo local
# En producción, MariaDB se instala en el host (gestionado por Plesk)
# y Redis se ejecuta con Docker (ver docker/start-redis.sh)

services:
  mariadb:
    image: mariadb:11.2
    container_name: paco-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: paco123
      MYSQL_DATABASE: paco_el_cunao
      MYSQL_USER: paco
      MYSQL_PASSWORD: paco123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: paco-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:

server {
    listen 80;
    server_name _;  # Reemplaza con tu dominio, ej: ayudaapaco.com

    # Raíz de archivos estáticos del frontend
    root /var/www/paco/frontend;
    index index.html;

    # Caché para assets estáticos
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy de la API al backend Fastify
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhooks de WhatsApp también van al backend
    location /webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend: sirve index.html para cualquier ruta desconocida
    location / {
        try_files $uri $uri/ /index.html;
    }
}
